name: Refresh Market Data

# Twice-daily scheduled runs + manual trigger from dashboard
on:
  workflow_dispatch:         # Manual trigger button
  schedule:
    # Times in UTC. Israel is UTC+3 (DST) or UTC+2 (winter).
    - cron: '43 21 * * *'    # 21:43 UTC = 00:43 Israel — after US market close (full day's data)
    - cron: '43 9 * * *'     # 09:43 UTC = 12:43 Israel — before US market opens (morning check)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25      # Screener can take 10-15 min
    permissions:
      contents: write        # Needed to push updated mockData.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Stage 1 — Finviz Pre-Screen
        run: python scripts/finviz_screen.py

      - name: Stage 2 — Deep Analysis (yfinance)
        run: python scripts/fetch_data.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet src/lib/mockData.json scripts/fundamentals_cache.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data has changed — will commit"
          fi

      - name: Commit and push updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add src/lib/mockData.json scripts/fundamentals_cache.json
          git commit -m "data: auto-refresh from screener ($(date -u +%Y-%m-%d))"
          git push
